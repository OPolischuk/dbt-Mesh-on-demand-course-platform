version: 2

models:
  - name: fct_order_items
    description: "Fact table containing order items"
    config:
      contract:
        enforced: true
    columns:
      - name: order_item_id
        data_type: varchar
        description: "Primary key of order items"
        constraints:
          - type: not_null
          - type: primary_key
      - name: order_id
        data_type: varchar
      - name: product_id
        data_type: varchar
      - name: location_id
        data_type: varchar
      - name: customer_id
        data_type: varchar
      - name: order_total
        data_type: number(28,6)
      - name: tax_paid
        data_type: number(28,6)
      - name: ordered_at
        data_type: timestamp_ntz
      - name: customer_name
        data_type: varchar
      - name: location_name
        data_type: varchar
      - name: tax_rate
        data_type: number(10,4)
      - name: location_opened_at
        data_type: timestamp_ntz