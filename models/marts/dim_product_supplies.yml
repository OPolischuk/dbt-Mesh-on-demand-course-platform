version: 2

models:
  - name: dim_product_supplies
    description: "Dimension table containing product and supply information"
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        data_type: varchar
        description: "Primary key of products"
        constraints:
          - type: not_null
          - type: primary_key
      - name: product_name
        data_type: varchar
      - name: product_type
        data_type: varchar
      - name: product_description
        data_type: varchar
      - name: product_price
        data_type: number(28,6)
      - name: is_food_item
        data_type: boolean
      - name: is_drink_item
        data_type: boolean
      - name: supply_cost
        data_type: number(28,6)